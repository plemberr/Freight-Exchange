version: "3.9"

services:

  # ==================================
  # DATABASES
  # ==================================

  auth-postgres:
    image: postgres:16
    container_name: auth-postgres
    restart: always

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass

    ports:
      - "5432:5432"

    volumes:
      - auth_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  user-postgres:
    image: postgres:16
    container_name: user-postgres
    restart: always

    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - user_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service"]
      interval: 10s
      timeout: 5s
      retries: 5


  listing-postgres:
    image: postgres:16
    container_name: listing-postgres
    restart: always

    environment:
      POSTGRES_DB: listings_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5434:5432"

    volumes:
      - listing_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d listings_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  moderation-postgres:
    image: postgres:16
    container_name: moderation-postgres
    restart: always

    environment:
      POSTGRES_DB: moderation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5435:5432"

    volumes:
      - moderation_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moderation_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ==================================
  # KAFKA INFRA
  # ==================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"


  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always

    depends_on:
      - zookeeper

    ports:
      - "29092:29092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      ALLOW_PLAINTEXT_LISTENER: "yes"


  # ==================================
  # AUTH SERVICE
  # ==================================

  auth-service:
    build:
      context: ./auth-service

    container_name: auth-service
    restart: always

    depends_on:
      auth-postgres:
        condition: service_healthy
      kafka:
        condition: service_started

    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/auth_db
      DB_USER: auth_user
      DB_PASSWORD: auth_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: this_is_a_very_long_secret_key_for_auth_service_123456

    ports:
      - "8081:8081"


  # ==================================
  # USER SERVICE (Python)
  # ==================================

  user-service:
    build:
      context: ./user-service

    container_name: user-service
    restart: always

    depends_on:
      user-postgres:
        condition: service_healthy
      kafka:
        condition: service_started

    env_file:
      - ./user-service/.env

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@user-postgres:5432/user_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    ports:
      - "8000:8000"


  # ==================================
  # LISTING SERVICE
  # ==================================

  listing-service:
    build:
      context: ./listing-service

    container_name: listing-service
    restart: always

    depends_on:
      listing-postgres:
        condition: service_healthy
      kafka:
        condition: service_started

    env_file:
      - ./listing-service/.env

    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    ports:
      - "8001:8000"


  # ==================================
  # MODERATION SERVICE
  # ==================================

  moderation-service:
    build:
      context: ./moderation-service

    container_name: moderation-service

    restart: always

    depends_on:
      moderation-postgres:
        condition: service_healthy
      kafka:
        condition: service_started

    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATASOURCE_URL: jdbc:postgresql://moderation-postgres:5432/moderation_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      JWT_PUBLIC_KEY_PATH: keys/public.pem

    ports:
      - "8084:8084"


# ==================================
# VOLUMES
# ==================================

volumes:
  auth_pg_data:
  user_pg_data:
  listing_pg_data:
  moderation_pg_data: