version: "3.9"

services:

  # =========================
  # AUTH DATABASE
  # =========================

  auth-postgres:
    image: postgres:16
    container_name: auth-postgres
    restart: always

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass

    ports:
      - "5432:5432"

    volumes:
      - auth_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # USER DATABASE
  # =========================

  user-postgres:
    image: postgres:16
    container_name: user-postgres
    restart: always

    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - user_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # ZOOKEEPER
  # =========================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"

  # =========================
  # KAFKA
  # =========================

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always

    depends_on:
      - zookeeper

    ports:
      - "29092:29092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      ALLOW_PLAINTEXT_LISTENER: "yes"

  # =========================
  # AUTH SERVICE
  # =========================

  auth-service:
    build:
      context: ./auth-service

    container_name: auth-service

    restart: always

    depends_on:
      auth-postgres:
        condition: service_healthy
      kafka:
        condition: service_started

    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_USER: auth_user
      DB_PASSWORD: auth_pass

      JWT_SECRET: this_is_a_very_long_secret_key_for_auth_service_123456

      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/auth_db

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    ports:
      - "8081:8081"

  # =========================
  # USER SERVICE
  # =========================

  user-service:
    build:
      context: ./user-service

    container_name: user-service

    restart: always

    depends_on:
      user-postgres:
        condition: service_healthy
      kafka:
        condition: service_started

    env_file:
      - ./user-service/.env

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@user-postgres:5432/user_service

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    ports:
      - "8000:8000"

volumes:
  auth_pg_data:
  user_pg_data: