version: '3.9'

services:

  moderation-db:
    image: postgres:16
    container_name: moderation-db

    environment:
      POSTGRES_DB: moderation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5434:5432"

    volumes:
      - moderation_postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

    ports:
      - "2181:2181"

    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    restart: unless-stopped

  moderation-service:
    build: .

    container_name: moderation-service

    depends_on:
      - moderation-db
      - kafka

    ports:
      - "8084:8084"

    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_URL: jdbc:postgresql://moderation-db:5432/moderation_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      JWT_PUBLIC_KEY_PATH: keys/public.pem

    restart: unless-stopped

volumes:
  moderation_postgres_data: