<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Настройки — FreightHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body data-login="solid" data-page="settings">
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">Freight<b>Hub</b></a>

      <nav class="nav" data-nav-menu aria-label="Основная навигация">
        <a href="index.html" class="nav__link" data-nav-key="home">Главная</a>
        <a href="search-cargo.html" class="nav__link" data-nav-key="cargo">Найти груз</a>
        <a href="search-transport.html" class="nav__link" data-nav-key="transport">Найти транспорт</a>
        <a href="about.html" class="nav__link" data-nav-key="about">О сервисе</a>
        <a href="index.html#contacts" class="nav__link" data-nav-key="contacts">Контакты</a>
        <a href="moderator.html" class="nav__link" data-nav-key="moderation" data-mod-link hidden>Модерация</a>
      </nav>

      <div class="header__actions">
        <button class="lang" type="button">RU
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>

        <a href="auth.html" class="btn btn--primary" data-login-btn>
          Войти
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <path d="M10 17l5-5-5-5"/>
            <path d="M15 12H3"/>
          </svg>
        </a>

        <button class="burger" data-burger type="button" aria-label="Меню" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="account-grid">

      <div class="profile-card">
        <div class="avatar">A</div>
        <div class="profile-card__name">Пользователь</div>
        <div class="profile-card__email">Почта</div>
      </div>

      <nav class="account-menu" data-account-menu>
        <div class="account-menu__item" data-href="cabinet.html">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h10"/>
          </svg>
          Мои объявления
        </div>

        <div class="account-menu__item" data-href="create-cargo.html">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 8v8M8 12h8"/>
          </svg>
          Добавить объявление
        </div>

        <div class="account-menu__item is-active">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 19.4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 3 12a2 2 0 1 1 0-4 1.7 1.7 0 0 0 1.5-2.6l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 12 3a2 2 0 1 1 4 0 1.7 1.7 0 0 0 2.6 1.5l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.7 1.7 0 0 0 21 12a2 2 0 1 1 0 4 1.7 1.7 0 0 0-1.6 1z"/>
          </svg>
          Настройки
        </div>
      </nav>
    </div>

    <div class="card">
      <h1 class="wizard-card__title" style="margin-bottom:var(--space-5)">
        Настройки аккаунта
      </h1>

      <form class="settings-form">
        <div class="field">
          <label class="field__label">Имя</label>
          <input class="input" type="text" placeholder="Введите имя">
        </div>

        <div class="field">
          <label class="field__label">Email</label>
          <input class="input" type="email" readonly>
        </div>

        <div class="field">
          <label class="field__label">Телефон</label>
          <input class="input" type="text" placeholder="Введите телефон">
        </div>

        <div style="border-top:1px solid var(--line-soft);padding-top:var(--space-5)">
          <button class="btn btn--primary" type="submit">
            Сохранить изменения
          </button>
        </div>
      </form>
    </div>

  </main>

  <footer class="footer" id="contacts">
    <div class="container">
      <div class="footer__grid">
        <div class="footer__brand">
          <a href="index.html" class="logo">Freight<b>Hub</b></a>
          <p class="footer__about">
            Автоматизация поиска грузов и работы с проверенными перевозчиками.
          </p>
        </div>
      </div>

      <div class="footer__copy">
        © FreightHub, 2026. Все права защищены.
      </div>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/integration.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
