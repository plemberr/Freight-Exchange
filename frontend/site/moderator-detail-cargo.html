<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Заявка: груз — FreightHub</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body data-page="moderator-detail-cargo">
  <div class="mod">

    <aside class="mod__sidebar">
      <div class="mod__brand">
        <a href="index.html" class="logo">Freight<b>Hub</b></a>
      </div>

      <nav class="mod__menu">
        <a href="moderator.html" class="mod__menu-item is-active">
          Поступающие заявки
        </a>
      </nav>

      <a href="index.html" class="mod__logout">Выйти</a>
    </aside>

    <div class="mod__main">

      <!-- TOPBAR -->
      <div class="mod__topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <h1>Заявка</h1>
        </div>

        <!-- Модератор -->
        <div class="mod__topbar-right">
          <div class="userchip">
            <span>
              <span class="userchip__name" data-moderator-name>...</span><br>
              <span class="userchip__role">Модератор</span>
            </span>
          </div>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="mod__content">

        <div class="detail-layout" style="padding-bottom:0">

          <div class="detail-main">

            <!-- HEADER -->
            <div class="card">
              <div class="detail-head__top">
                <span class="badge badge--green" data-cargo-type-badge>—</span>
              </div>

              <h2 class="detail-head__title" data-route-title>—</h2>

              <div class="detail-head__sub" data-route-sub>—</div>

              <div class="route-box">

                <div class="route-point">
                  <div class="route-point__country" data-origin-country>—</div>
                  <div class="route-point__city" data-origin-city>—</div>
                </div>

                <div class="route-line">Прямой рейс<span class="dash"></span>0 км</div>

                <div class="route-point route-point--to">
                  <div class="route-point__country" data-dest-country>—</div>
                  <div class="route-point__city" data-dest-city>—</div>
                </div>

              </div>
            </div>

            <!-- CARGO -->
            <div class="card">
              <h2>Параметры груза</h2>

              <div class="params-grid">

                <div class="param">
                  <div>
                    <div class="param__label">Тип</div>
                    <div class="param__value" data-cargo-type>—</div>
                  </div>
                </div>

                <div class="param">
                  <div>
                    <div class="param__label">Вес</div>
                    <div class="param__value" data-weight>—</div>
                  </div>
                </div>

                <div class="param">
                  <div>
                    <div class="param__label">Габариты</div>
                    <div class="param__value" data-dimensions>—</div>
                  </div>
                </div>

                <div class="param">
                  <div>
                    <div class="param__label">Объём</div>
                    <div class="param__value" data-volume>—</div>
                  </div>
                </div>

              </div>
            </div>

            <!-- DESCRIPTION -->
            <div class="card">
              <h2>Описание</h2>
              <p class="desc-text" data-description>—</p>
            </div>

            <!-- ACTIONS -->
            <div class="review-actions">
              <button class="btn btn--primary btn--lg" data-approve>Принять</button>
              <button class="btn btn--outline btn--lg" data-reject>Отклонить</button>
            </div>

            <textarea class="textarea" data-reject-reason placeholder="Причина отклонения"></textarea>

          </div>

          <!-- SIDEBAR -->
          <aside>
            <div class="side-card">
              <div class="side-card__price" data-cargo-price>—</div>
              <div class="side-card__perkm" data-price-per-km></div>
              <div class="side-card__company" data-owner-name>—</div>
              <div class="side-contacts">
                <span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
                  <span data-owner-email>—</span>
                </span>
                <span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg>
                  <span data-owner-phone>—</span>
                </span>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/site.js"></script>
  <script src="js/integration.js"></script>
</body>
</html>
