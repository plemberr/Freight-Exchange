<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Редактировать объявление (груз) — FreightHub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body data-page="edit-cargo" data-login="solid">

<header class="header">
  <div class="container header__inner">
    <a href="index.html" class="logo">Freight<b>Hub</b></a>

    <nav class="nav" data-nav-menu aria-label="Основная навигация">
      <a href="index.html" class="nav__link" data-nav-key="home">Главная</a>
      <a href="search-cargo.html" class="nav__link" data-nav-key="cargo">Найти груз</a>
      <a href="search-transport.html" class="nav__link" data-nav-key="transport">Найти транспорт</a>
      <a href="about.html" class="nav__link" data-nav-key="about">О сервисе</a>
      <a href="index.html#contacts" class="nav__link" data-nav-key="contacts">Контакты</a>
      <a href="moderator.html" class="nav__link" data-nav-key="moderation" data-mod-link hidden>Модерация</a>
    </nav>

    <div class="header__actions">

      <a href="auth.html" class="btn btn--primary" data-login-btn>Войти</a>

      <button class="burger" data-burger type="button"></button>
    </div>
  </div>
</header>


<main class="container wizard">
  <h1 class="wizard__title">Редактирование груза</h1>

  <form>

    <!-- ================= ROUTE ================= -->
    <div class="form-section">
      <h2>Маршрут</h2>

      <div class="form-row">
        <div class="field">
          <label>Страна отправления</label>
          <input class="input" data-field="route.origin.country">
        </div>

        <div class="field">
          <label>Город отправления</label>
          <input class="input" data-field="route.origin.city">
        </div>

        <div class="field">
          <label>Адрес отправления</label>
          <input class="input" data-field="route.origin.address">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Страна назначения</label>
          <input class="input" data-field="route.destination.country">
        </div>

        <div class="field">
          <label>Город назначения</label>
          <input class="input" data-field="route.destination.city">
        </div>

        <div class="field">
          <label>Адрес назначения</label>
          <input class="input" data-field="route.destination.address">
        </div>
      </div>
    </div>

    <!-- ================= CARGO ================= -->
    <div class="form-section">
      <h2>Параметры груза</h2>

      <div class="form-row">
        <div class="field">
          <label>Тип груза</label>
          <select class="select" data-field="cargo.cargoType">
            <option value="">Выбрать</option>
            <option value="BOX">Коробка</option>
            <option value="PALLET">Паллет</option>
            <option value="BULK">Насыпной</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Длина, м</label>
          <input class="input" type="number" data-field="cargo.length">
        </div>

        <div class="field">
          <label>Ширина, м</label>
          <input class="input" type="number" data-field="cargo.width">
        </div>

        <div class="field">
          <label>Высота, м</label>
          <input class="input" type="number" data-field="cargo.height">
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Вес, кг</label>
          <input class="input" type="number" data-field="cargo.weight">
        </div>

        <div class="field">
          <label>Объём, м³</label>
          <input class="input" type="number" data-field="cargo.volume" disabled>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Цена, €</label>
          <input class="input" type="number" data-field="cargo.price">
        </div>
      </div>
    </div>

    <!-- ================= DESCRIPTION ================= -->
    <div class="form-section">
      <h2>Описание</h2>

      <div class="field">
        <label>Описание</label>
        <textarea class="textarea" data-field="description"></textarea>
      </div>
    </div>

    <!-- ================= SUBMIT ================= -->
    
    <div style="text-align:center; padding: 40px 0; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
  
      <button class="btn btn--gray btn--lg" type="button" data-send-moderation>
        Отправить на модерацию
      </button>

      <button class="btn btn--primary btn--lg" type="submit">
        Сохранить изменения
      </button>

    </div>

  </form>
</main>


<footer class="footer">
  <div class="container">
    <div class="footer__copy">© FreightHub, 2026</div>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/integration.js"></script>
<script src="js/site.js"></script>

</body>
</html>
