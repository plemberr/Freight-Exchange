# ============================================================
# FreightHub frontend — статика + reverse proxy (API Gateway).
#
# Браузер общается ТОЛЬКО с этим origin. Запросы /api/v1/<сервис>/
# проксируются на нужный микросервис по внутренней docker-сети
# (имена = имена сервисов из docker-compose). Поэтому на фронте
# нет ни хостов, ни портов, ни CORS.
#
# Имена сервисов резолвятся через встроенный DNS Docker (127.0.0.11)
# в рантайме — это позволяет nginx стартовать, даже если какой-то
# сервис ещё поднимается, и переживать их рестарты.
# ============================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS Docker для резолва имён апстримов в рантайме
    resolver 127.0.0.11 ipv6=off valid=10s;

    # общие заголовки проксирования (наследуются всеми location)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Браузер↔nginx — один origin; хоп nginx→сервис серверный, поэтому
    # НЕ пробрасываем браузерный Origin (пустое значение = удалить заголовок).
    # Иначе Spring-CORS на бэке режет запрос 403, т.к. localhost:8080 не в
    # его белом списке. Так шлюз остаётся single-origin без правок сервисов.
    proxy_set_header Origin            "";
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # ---------- СТАТИКА ----------
    location / {
        try_files $uri $uri/ =404;
    }

    # лёгкое кэширование ассетов
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---------- API GATEWAY ----------
    # Java — auth (Spring, порт 8081)
    location /api/v1/auth/ {
        set $up auth-service:8081;
        proxy_pass http://$up;
    }
    # Java — moderation (Spring, порт 8084)
    location /api/v1/moderation/ {
        set $up moderation-service:8084;
        proxy_pass http://$up;
    }
    # Java — search (Spring, порт 8085)
    location /api/v1/search/ {
        set $up search-service:8085;
        proxy_pass http://$up;
    }
    # Python — users (FastAPI, порт 8000)
    location /api/v1/users/ {
        set $up user-service:8000;
        proxy_pass http://$up;
    }
    # Python — listings (FastAPI, порт 8000)
    location /api/v1/listings/ {
        set $up listing-service:8000;
        proxy_pass http://$up;
    }
    # Python — cargo (FastAPI, порт 8000)
    location /api/v1/cargo/ {
        set $up cargo-service:8000;
        proxy_pass http://$up;
    }
    # Python — routes (FastAPI, порт 8000)
    location /api/v1/routes/ {
        set $up route-service:8000;
        proxy_pass http://$up;
    }
}
